services:
  - type: web
    name: drift
    runtime: node
    buildCommand: >
      npm install --legacy-peer-deps &&
      npm run build &&
      cd server &&
      npm install &&
      npx drizzle-kit migrate
    startCommand: cd server && npx tsx src/index.ts
    disk:
      name: drift-uploads
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Neon Postgres — set these in the Render dashboard (not here to avoid committing secrets)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      # Anthropic (optional — only needed for provider=claude)
      - key: ANTHROPIC_API_KEY
        sync: false
      # Storage for uploaded meal photos
      - key: UPLOAD_PATH
        value: /data/uploads
      # AI provider (gemma = local Ollama, claude = Anthropic API)
      - key: AI_PROVIDER
        value: claude
      # Better Auth — set in Render dashboard
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: APP_URL
        sync: false
      # Google OAuth — set in dashboard; redirect URI in Google Console must be
      # ${BETTER_AUTH_URL}/api/auth/callback/google (same host as this service URL)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Garmin token encryption key
      - key: GARMIN_ENCRYPTION_KEY
        sync: false
